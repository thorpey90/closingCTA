<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTA Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; overflow: hidden; }

  /* Full-width band */
  .cta-banner {
    width: 100%;
    background: #032626;
    padding: clamp(48px, 7vw, 88px) 0;
  }

  /* Centered content container — HubSpot style */
  .cta-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 clamp(24px, 6vw, 80px);
  }

  .cta-heading {
    font-family: 'Lora', serif;
    font-size: clamp(26px, 4vw, 52px);
    font-weight: 500;
    color: #F2F0EB;
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: clamp(28px, 4vw, 40px);
  }

  .cta-heading .accent { color: #F2F0EB; }

  .cta-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    padding: 14px 28px;
    background: #120DA6;
    color: #F2F0EB;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .btn-primary:hover { background: #0e0a8a; }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    padding: 13px 28px;
    background: #E4EEF2;
    color: #120DA6;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    border: 1.5px solid #120DA6;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .btn-secondary:hover {
    background: #c2d6de;
    border-color: #0e0a8a;
    color: #0e0a8a;
  }

  /* iPad */
  @media (max-width: 768px) {
    .btn-primary, .btn-secondary { font-size: 14px; padding: 13px 22px; }
  }

  /* iPhone */
  @media (max-width: 480px) {
    .cta-buttons { flex-direction: column; align-items: flex-start; gap: 10px; }
    .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<div class="cta-banner">
  <div class="cta-inner">

    <h2 class="cta-heading">
      The person closest to the student is the most qualified to write the story<span class="accent">.</span>
    </h2>

    <div class="cta-buttons">
      <a href="#" class="btn-primary">Start for free</a>
      <a href="#" class="btn-secondary">Explore team access</a>
    </div>

  </div>
</div>

<script>
  function reportHeight() {
    const h = Math.ceil(document.querySelector('.cta-banner').getBoundingClientRect().height);
    window.parent.postMessage({ type: 'iframe-height', height: h }, '*');
  }
  window.addEventListener('load', reportHeight);
  window.addEventListener('resize', reportHeight);
</script>

</body>
</html>
